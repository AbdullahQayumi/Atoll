<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Spoke Directory</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 40px;
            color: #333;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #111;
        }
        p.subtitle {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 40px;
        }
        /* Forces exactly 5 items per row with matching gap distribution */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 20px;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }
        .product-name {
            font-size: 1.15rem;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: #222;
        }
        .product-price {
            font-size: 1.1rem;
            color: #28a745;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .btn {
            display: block;
            text-align: center;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>Atoll E-Store</h1></h1>
    <p class="subtitle">----------------------------------</p>

    <div class="product-grid">
        {% for product in products %}
        <div class="product-card">
            <div>
                <h2 class="product-name">{{ product.name }}</h2>
                <div class="product-price">£{{ "%.2f"|format(product.price) }}</div>
            </div>
            <a href="/item/{{ product.slug }}" class="btn">Visit Website →</a>
        </div>
        {% endfor %}
    </div>

</body>
</html>
