<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ item.name }} - Atoll Storefront</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 40px;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Container for the product storefront page */
        .store-container {
            position: relative; /* Allows child elements to position relative to this box */
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid #e9ecef;
            text-align: center;
        }

        /* The Back Arrow Button - positioned top-left of the card */
        .back-button {
            position: absolute;
            top: 25px;
            left: 25px;
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #6c757d;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s, transform 0.2s;
        }

        .back-button:hover {
            color: #007bff;
            transform: translateX(-3px); /* Subtle nudge left on hover */
        }

        .back-button svg {
            margin-right: 6px;
        }

        .product-title {
            font-size: 2rem;
            margin-top: 40px; /* Make space for the back button above */
            margin-bottom: 10px;
            color: #111;
        }

        .product-price {
            font-size: 1.5rem;
            color: #28a745;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .buy-btn {
            display: inline-block;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: background-color 0.2s;
            width: 80%;
        }

        .buy-btn:hover {
            background-color: #218838;
        }

        .badge {
            display: inline-block;
            background-color: #e2e3e5;
            color: #383d41;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="store-container">
        <a href="/" class="back-button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Directory
        </a>

        <div class="badge">Independent Spoke Website</div>
        <h1 class="product-title">{{ item.name }}</h1>
        <div class="product-price">£{{ "%.2f"|format(item.price) }}</div>
        
        <p style="color: #666; line-height: 1.6; margin-bottom: 30px;">
            Welcome to the dedicated web experience for the <strong>{{ item.name }}</strong>. 
            This page operates completely independently from the main catalog hub.
        </p>

        <a href="#" class="buy-btn" onclick="alert('Demo Purchase Triggered!')">Purchase Now</a>
    </div>

</body>
</html>
