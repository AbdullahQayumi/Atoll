<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ item.item_name }} - Nexus Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7359430411392154"
        crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: rgba(31, 41, 55, 0.4); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body x-data="{ quantity: 1 }">

    <header class="sticky top-0 z-30 glass border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="/" class="text-sm font-semibold text-gray-400 hover:text-white flex items-center gap-2">
                &larr; Back to Catalog
            </a>
            <span class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">NEXUS</span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-12">
        <div class="glass rounded-3xl p-8 sm:p-12 border border-gray-800 grid grid-cols-1 md:grid-cols-2 gap-12">
            
            <!-- Visual Product Box -->
            <div class="w-full h-80 md:h-full bg-gradient-to-br from-gray-800 to-gray-900 rounded-2xl flex items-center justify-center border border-gray-800 shadow-inner">
                <span class="text-8xl opacity-30">⚡</span>
            </div>

            <!-- Item Information -->
            <div class="flex flex-col justify-between">
                <div>
                    <span class="px-3 py-1 bg-blue-500/10 border border-blue-500/20 text-blue-400 text-xs font-semibold uppercase tracking-widest rounded-full">Premium Item</span>
                    <h1 class="text-3xl sm:text-4xl font-extrabold text-white mt-4 mb-2">{{ item.item_name }}</h1>
                    <p class="text-3xl font-black text-blue-400 mb-6">£{{ "%.2f"|format(item.price|float) }}</p>
                    <p class="text-gray-400 text-sm leading-relaxed mb-6">High performance, state-of-the-art tech specifications. Ready for instant deployment and checkout.</p>
                </div>

                <!-- Direct Purchase / External Link Options -->
                <div class="space-y-4">
                    {% if item.stripe_link %}
                    <a href="{{ item.stripe_link }}" target="_blank" class="w-full py-3.5 px-4 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-bold text-center block shadow-lg shadow-blue-600/30 transition">
                        Buy Now Direct
                    </a>
                    {% endif %}

                    <a href="/" class="w-full py-3 px-4 rounded-xl bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium text-center block border border-gray-700 transition">
                        Return to Storefront
                    </a>
                </div>
            </div>

        </div>
    </main>
</body>
</html>
