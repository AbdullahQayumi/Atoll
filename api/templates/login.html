<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Nexus Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="glass w-full max-w-md p-8 rounded-3xl border border-gray-800 shadow-2xl">
        <h2 class="text-2xl font-black text-white text-center mb-2">Welcome Back</h2>
        <p class="text-xs text-gray-400 text-center mb-6">Log in with your account email</p>

        {% if error %}
        <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-xs p-3 rounded-xl mb-4 text-center">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">Email Address</label>
                <input type="email" name="email" required placeholder="you@example.com" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">Password</label>
                <input type="password" name="password" required class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl text-sm transition">
                Log In
            </button>
        </form>

        <p class="text-xs text-center text-gray-500 mt-6">
            Don't have an account? <a href="/signup" class="text-blue-400 hover:underline">Sign Up</a>
        </p>
    </div>
</body>
</html>
