<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ item.item_name }} - Official Store</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #ffffff; color: #111; margin: 0; display: flex; min-height: 100vh; align-items: center; justify-content: center; }
        .store-wrapper { max-width: 500px; text-align: center; padding: 30px; border: 1px solid #eaeaea; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #000; }
        .price { font-size: 1.5rem; color: #0070f3; font-weight: bold; margin: 15px 0; }
        .desc { color: #666; line-height: 1.6; margin-bottom: 30px; }
        .buy-now { display: block; background: #000; color: #fff; padding: 15px; text-decoration: none; border-radius: 6px; font-weight: bold; letter-spacing: 0.5px; transition: 0.2s; }
        .buy-now:hover { background: #333; }
        .back-hub { display: inline-block; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="store-wrapper">
        <h1>{{ item.item_name }}</h1>
        <div class="price">${{ item.price }}</div>
        <p class="desc">{{ item.description }}</p>
        
        <a href="{{ item.stripe_link }}" target="_blank" class="buy-now">Secure Checkout</a>
        
        <br>
        <a href="/" class="back-hub">← Return to central directory</a>
    </div>
</body>
</html>
