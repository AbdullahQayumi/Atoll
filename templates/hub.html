<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Product Network Hub</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; color: #333; padding: 40px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card h2 { margin-top: 0; }
        .btn { display: inline-block; background: #0070f3; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Product Spoke Directory</h1>
        <p>Select an item to view its completely independent storefront website:</p>
        
        <div class="grid">
            {% for product in products %}
            <div class="card">
                <h2>{{ product.item_name }}</h2>
                <p><strong>Price:</strong> ${{ product.price }}</p>
                <a href="/item/{{ product.slug }}" class="btn">Visit Website →</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
